<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aday İşlemleri</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f3f3f3;
}

.top-bar {
    background-color: #f57c00;
    height: 120px;
}

.container {
    max-width: 1000px;
    margin: -60px auto 0 auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.1);
    padding: 40px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-header {
    display: flex;
    align-items: center;
    gap: 20px;
}

.left-header img {
    height: 60px;
}

.right-header {
    display: flex;
    gap: 15px;
}

.top-btn {
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    color: white;
}

.red { background-color: #d32f2f; }
.blue { background-color: #3949ab; }
.darkblue { background-color: #1a237e; }

.top-btn:hover {
    opacity: 0.9;
}

/* Breadcrumb */
.breadcrumb {
    margin-top: 30px;
    font-size: 14px;
    color: #777;
}

.breadcrumb span {
    color: #f57c00;
}

/* Login */
.login-box {
    margin-top: 40px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    background: #fafafa;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 13px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.login-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 6px;
    background-color: #1a237e;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

.login-btn:hover {
    opacity: 0.9;
}

.forgot {
    display: block;
    margin-top: 10px;
    text-align: left;
    font-size: 14px;
    color: #1a237e;
    text-decoration: none;
}

.forgot:hover {
    text-decoration: underline;
}

.error {
    color: red;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="top-bar"></div>

<div class="container">

    <div class="header">
        
        <div class="left-header">
            <img src="osym-logo.png" alt="Logo">
            <h2>Aday İşlem Sistemi</h2>
        </div>

        <div class="right-header">
            <button class="top-btn red">e-Devlet ile Giriş</button>
            <button class="top-btn blue">e-Devlet ile Kayıt Ol</button>
            <button class="top-btn darkblue">Sisteme Giriş</button>
        </div>

    </div>

    <div class="breadcrumb">
        Ana Sayfa / <span>Sisteme Giriş</span>
    </div>

    <div class="login-box">
        <h2>Sisteme Giriş</h2>

        <input type="text" id="user" placeholder="T.C. Kimlik / YU No">
        <input type="password" id="pass" placeholder="Şifre">

        <a href="#" class="forgot">Şifremi Unuttum</a>

        <button class="login-btn" onclick="giris()">Giriş Yap</button>

        <div id="error" class="error"></div>
    </div>

</div>

<script>
function giris() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if (user === "37876599284" && pass === "bilal2007") {
        window.location.href = "sonuclar.html";
    } else {
        document.getElementById("error").innerText = "Kullanıcı adı veya şifre yanlış";
    }
}
</script>

</body>
</html>
